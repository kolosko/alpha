name: Robust Activity Bot

on:
  schedule:
    - cron: '0 */7 * * *'
  workflow_dispatch:

jobs:
  make-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Secure Update
        run: |
          # 1. Рандомна затримка
          sleep $((RANDOM % 800))
          
          # 2. Шанс на пропуск для органічного вигляду (20%)
          if [ $((RANDOM % 10)) -lt 2 ]; then
            echo "Organic skip."
            exit 0
          fi

          TIMESTAMP=$(date "+%Y-%m-%d %H:%M")

          # 3. Спроба отримати дані з API (з тайм-аутом 10 сек)
          RESPONSE=$(curl -s --max-time 10 "https://api.coingecko.com/api/v3/simple/price?ids=ethereum&vs_currencies=usd")
          ETH=$(echo $RESPONSE | jq -r '.ethereum.usd // empty')

          # 4. Перевірка результату: якщо API видало помилку, використовуємо системний лог
          if [ -z "$ETH" ] || [ "$ETH" == "null" ]; then
            LOG_ENTRY="[$TIMESTAMP] System check: session active"
            COMMIT_MSG="system: heartbeat update $TIMESTAMP [skip ci]"
          else
            LOG_ENTRY="[$TIMESTAMP] Market Report: ETH at \$$ETH USD"
            COMMIT_MSG="data: eth price update $TIMESTAMP [skip ci]"
          fi

          # 5. Оновлення файлу (зберігаємо останні 50 записів)
          echo "$LOG_ENTRY" >> market_data.log
          echo "$(tail -n 40 market_data.log)" > market_data.log

          # 6. Налаштування Git та Пуш
          git config --local user.email "sergeevnaalina587@gmail.com"
          git config --local user.name "GitHub Action Bot"
          
          git add market_data.log
          git commit -m "$COMMIT_MSG"
          git push
